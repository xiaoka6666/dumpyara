name: Dumpyara Automation

on:
  workflow_dispatch:  # 手动触发工作流

jobs:
  dumpyara:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Set up Git
      - name: Set up Git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

      # Clone the dumpyara repository
      - name: Clone dumpyara repository
        run: |
          git clone https://github.com/xiaoka6666/dumpyara.git

      # Set up required dependencies
      - name: Install dependencies
        run: |
          cd dumpyara
          bash setup.sh

      # Run the dumpyara script
      - name: Run dumpyara
        env:
          TOKEN: ${{ secrets.TOKEN }}  # GitHub token stored in the Secrets
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}  # Telegram bot token stored in the Secrets
        run: |
          cd dumpyara
          bash dumpyara.sh "<OTAlink_or_OTAfiel_path>" ${{ secrets.TOKEN }}
