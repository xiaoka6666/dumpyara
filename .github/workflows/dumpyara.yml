name: Dumpyara Automation

on:
  workflow_dispatch:  # 手动触发工作流
    inputs:
      OTA_LINK:
        description: 'OTA 链接或文件路径'
        required: true
        default: 'https://bn.d.miui.com/V14.0.5.0.SJNCNXM/miui_CEZANNE_V14.0.5.0.SJNCNXM_7ff0af0ef7_12.0.zip'  # 填入默认的 OTA 链接或文件路径

jobs:
  dumpyara:
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新版本作为运行环境
    
    steps:
      # 检出代码库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 克隆 dumpyara 仓库
      - name: Clone dumpyara repository
        run: |
          git clone https://github.com/xiaoka6666/dumpyara.git

      # 安装所需的依赖
      - name: Install dependencies
        run: |
          cd dumpyara
          bash setup.sh

      # 运行 dumpyara 脚本，使用手动提供的 OTA 链接
      - name: Run dumpyara
        env:
          GIT_OAUTH_TOKEN: ${{ secrets.GIT_OAUTH_TOKEN }}  # GitHub token stored in the Secrets
        run: |
          cd dumpyara
          bash dumpyara.sh ${{ github.event.inputs.OTA_LINK }} ${{ secrets.GIT_OAUTH_TOKEN }}

      # 获取 "working" 目录中的文件夹名称作为新分支名
      - name: Get new branch name
        id: get_branch_name
        run: |
          # 获取 "working" 目录中第一个子文件夹的名称
          NEW_BRANCH=$(ls -d "dumpyara/working/"*/ | head -n 1)  # 获取第一个文件夹名
          NEW_BRANCH=$(basename "$NEW_BRANCH")  # 只保留文件夹名称
          echo "NEW_BRANCH_NAME=$NEW_BRANCH" >> $GITHUB_ENV  # 设置环境变量，供后续步骤使用

      # 创建新分支并上传 "working" 目录的内容
      - name: Create a new branch and push working directory
        run: |
          cd dumpyara  # 切换到正确的仓库目录
          git checkout -b ${{ env.NEW_BRANCH_NAME }}  # 使用 "working" 目录中的文件夹名创建新分支
          cp -r "dumpyara/working/${{ env.NEW_BRANCH_NAME }}"/* .  # 将该文件夹的内容复制到仓库根目录
          git add .  # 将更改添加到 Git 暂存区
          git commit -m "上传 working 目录内容"  # 提交更改
          git push origin ${{ env.NEW_BRANCH_NAME }}  # 推送新分支到 GitHub
