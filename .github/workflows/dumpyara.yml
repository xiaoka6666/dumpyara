name: Dumpyara Automation

on:
  workflow_dispatch:  # 手动触发工作流
    inputs:
      OTA_LINK:
        description: 'OTA link or file path'
        required: true
        default: 'https://bn.d.miui.com/V14.0.5.0.SJNCNXM/miui_CEZANNE_V14.0.5.0.SJNCNXM_7ff0af0ef7_12.0.zip'  # 填入默认的 OTA 链接或文件路径

jobs:
  dumpyara:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Clone the dumpyara repository
      - name: Clone dumpyara repository
        run: |
          git clone https://github.com/xiaoka6666/dumpyara.git

      # Set up required dependencies
      - name: Install dependencies
        run: |
          cd dumpyara
          bash setup.sh

      # Run the dumpyara script with the manually provided OTA link
      - name: Run dumpyara
        env:
          GIT_OAUTH_TOKEN: ${{ secrets.GIT_OAUTH_TOKEN }}  # GitHub token stored in the Secrets
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}  # Telegram bot token stored in the Secrets
        run: |
          cd dumpyara
          bash dumpyara.sh ${{ github.event.inputs.OTA_LINK }} ${{ secrets.GIT_OAUTH_TOKEN }}
