name: DumpYara Telegram Feed

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main

jobs:
  dumpyara:
    runs-on: ubuntu-latest  # 选择 Ubuntu 作为运行环境

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install Dependencies
      run: |
        # 如果需要的依赖在 requirements.txt 中，执行安装
        pip install -r requirements.txt

    - name: Run DumpYara Script
      run: |
        bash dumpyara.sh "$DUMPYARA_OTA_LINK" "$DUMPYARA_GITHUB_TOKEN"
      env:
        DUMPYARA_OTA_LINK: ${{ secrets.DUMPYARA_OTA_LINK }}  # 通过 GitHub Secrets 管理 OTA link
        DUMPYARA_GITHUB_TOKEN: ${{ secrets.DUMPYARA_GITHUB_TOKEN }}  # 通过 GitHub Secrets 管理 GitHub token
