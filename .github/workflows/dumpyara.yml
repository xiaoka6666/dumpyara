name: Dumpyara Automation

on:
  workflow_dispatch:  # 手动触发工作流
    inputs:
      OTA_LINK:
        description: 'OTA 链接或文件路径'
        required: true
        default: ''  # 填入默认的 OTA 链接或文件路径

jobs:
  dumpyara:
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新版本作为运行环境
    
    steps:
      # 检出代码库
      - name: Checkout repository
        uses: actions/checkout@v3

      # 克隆 dumpyara 仓库
      - name: Clone dumpyara repository
        run: |
          git clone https://github.com/xiaoka6666/dumpyara.git

      # 安装所需的依赖
      - name: Install dependencies
        run: |
          cd dumpyara
          bash setup.sh

      # 运行 dumpyara 脚本，使用手动提供的 OTA 链接
      - name: Run dumpyara
        run: |
          cd dumpyara
          bash dumpyara.sh ${{ github.event.inputs.OTA_LINK }}

      # 获取 "working" 目录中的文件夹名称作为新分支名
      - name: Get new branch name
        id: get_branch_name
        run: |
          # 获取 "working" 目录中第一个子文件夹的名称
          NEW_BRANCH=$(ls -d "$HOME/workspace/dumpyara/dumpyara/dumpyara/working/"*/ | head -n 1)  # 获取第一个文件夹名
          NEW_BRANCH=$(basename "$NEW_BRANCH")  # 只保留文件夹名称
          echo "NEW_BRANCH_NAME=$NEW_BRANCH" >> $GITHUB_ENV  # 设置环境变量，供后续步骤使用

      # 调试输出 "working" 目录的内容，确认路径和文件夹名称
      - name: List working directory content
        run: |
          echo "Listing contents of working directory:"
          ls -l "$HOME/workspace/dumpyara/dumpyara/dumpyara/working/"

      # 创建新分支并上传 "working" 目录的内容
      - name: Create a new branch and push working directory
        run: |
          cd "$HOME/workspace/dumpyara/dumpyara/dumpyara"  # 切换到正确的仓库目录
          git checkout -b ${{ env.NEW_BRANCH_NAME }}  # 使用 "working" 目录中的文件夹名创建新分支
          echo "Copying files from working/${{ env.NEW_BRANCH_NAME }} to root"
          # 检查目标文件夹是否存在
          if [ -d "$HOME/workspace/dumpyara/dumpyara/dumpyara/working/${{ env.NEW_BRANCH_NAME }}" ]; then
            cp -r "$HOME/workspace/dumpyara/dumpyara/dumpyara/working/${{ env.NEW_BRANCH_NAME }}/*" .  # 将该文件夹的内容复制到仓库根目录
          else
            echo "Error: Directory $HOME/workspace/dumpyara/dumpyara/dumpyara/working/${{ env.NEW_BRANCH_NAME }} does not exist!"
            exit 1  # 如果目录不存在，退出并报错
          fi
          git add .  # 将更改添加到 Git 暂存区
          git commit -m "上传 working 目录内容"  # 提交更改
          git push origin ${{ env.NEW_BRANCH_NAME }}  # 推送新分支到 GitHub
